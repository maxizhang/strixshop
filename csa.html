<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strix Shop A | Customer Support</title>
    <link rel="icon" type="image/png" href="logospfd.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020205;
            --sidebar-bg: rgba(10, 12, 18, 0.95);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-blue: #c1bee9;
            --text-main: #ffffff;
            --text-dim: #9aa4b2;
            --admin-bubble: #333872;
            --user-bubble: rgba(255, 255, 255, 0.08);
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: none; 
            overflow: hidden;
        }

        body.authorized { display: flex; }

        #bgstar { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        .sidebar {
            width: 380px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            backdrop-filter: blur(20px);
        }

        nav { padding: 25px; border-bottom: 1px solid var(--glass-border); text-align: center; }
        .logo img { height: 35px; cursor: pointer; display: block; margin: 0 auto 15px; }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--error);
            color: var(--error);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 15px;
            width: 100%;
        }

        .clear-btn:hover { background: var(--error); color: white; }

        .greeting-box {
            font-size: 0.8rem;
            line-height: 1.4;
            color: var(--accent-blue);
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: left;
        }

        .user-list { flex: 1; overflow-y: auto; padding: 10px; }

        .user-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: 12px; cursor: pointer;
            transition: 0.2s; border: 1px solid transparent; margin-bottom: 5px;
        }

        .user-item:hover { background: rgba(255,255,255,0.05); }
        .user-item.active { background: rgba(193, 190, 233, 0.1); border-color: var(--accent-blue); }

        .user-pfp { width: 40px; height: 40px; border-radius: 50%; background-color: #222; background-size: cover; flex-shrink: 0; }
        .user-info .name { font-weight: 700; font-size: 0.9rem; }
        .user-info .email { font-size: 0.75rem; color: var(--text-dim); }

        .main-chat { flex: 1; display: flex; flex-direction: column; z-index: 10; background: rgba(0,0,0,0.2); }
        .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); letter-spacing: 2px; }

        #messages-container {
            flex: 1; padding: 30px; overflow-y: auto;
            display: none; flex-direction: column; gap: 15px;
        }

        .msg-wrapper { max-width: 75%; display: flex; flex-direction: column; }
        .msg-admin { align-self: flex-end; align-items: flex-end; }
        .msg-user { align-self: flex-start; align-items: flex-start; }

        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; }
        .msg-admin .bubble { background: var(--admin-bubble); border-bottom-right-radius: 4px; color: white; }
        .msg-user .bubble { background: var(--user-bubble); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 0.65rem; color: var(--text-dim); margin-top: 5px; font-family: 'JetBrains Mono'; }

        .input-area {
            display: none; padding: 20px; gap: 12px;
            border-top: 1px solid var(--glass-border); background: var(--sidebar-bg);
        }

        #msg-input {
            flex: 1; padding: 14px 20px; border-radius: 25px;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05);
            color: white; outline: none;
        }

        .send-btn {
            width: 48px; height: 48px; border-radius: 50%; border: none;
            background: var(--accent-blue); color: #020205; cursor: pointer;
        }

        .user-item.active-chat {
            border: 1px solid var(--accent-blue);
            background: rgba(193, 190, 233, 0.15);
            box-shadow: 0 0 12px rgba(193, 190, 233, 0.2);
        }
    </style>
</head>
<body>

<canvas id="bgstar"></canvas>

<div class="sidebar">
    <nav>
        <a href="home.html" class="logo"><img src="logoh.png" alt="Strix Logo"></a>
        <div class="greeting-box" id="auto-greeting">Verifying user credentials...</div>
        <button class="clear-btn" id="clear-chat-trigger" style="display: none;">Delete Records</button>
    </nav>
    <div class="user-list" id="user-list"></div>
</div>

    <div class="main-chat">
        <div class="placeholder" id="placeholder">Waiting for server to load...</div>
        <div id="messages-container"></div>
        <div id="chat-header" style="
        padding: 15px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        font-weight: 700;
        color: var(--accent-blue);
        display: none;
    ">
        Chatting with: <span id="chat-name"></span>
    </div>

    <form class="input-area" id="chat-form">
        <input id="msg-input" placeholder="Type transmission..." autocomplete="off">
        <button class="send-btn">➤</button>
    </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDKed-yuAcwqKqcL6fn2WnBhRPcq-PbDtU", 
    authDomain: "strix-shop.firebaseapp.com",
    projectId: "strix-shop"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let activeClient = null;
const clearBtn = document.getElementById('clear-chat-trigger');

function toggleClearButton(show) {
    clearBtn.style.display = show ? 'block' : 'none';
}


clearBtn.onclick = async () => {
    if (!activeClient) return;

    if (!window.currentUser || window.currentUser.adminStatus !== true) {
        alert("ACCESS DENIED");
        return;
    }

    if (!confirm("WARNING: This will permanently delete all messages. Proceed?")) {
        return;
    }

    try {
        const messagesRef = collection(db, "support_chats", activeClient, "messages");
        const snapshot = await getDocs(messagesRef);

        if (snapshot.empty) {
            alert("Chat already empty");
            return;
        }

        const batch = writeBatch(db);

        snapshot.forEach(docSnap => {
            batch.delete(docSnap.ref);
        });

        await batch.commit();

        alert("CHAT DELETED SUCCESSFULLY");
    } catch (err) {
        console.error(err);
        alert("Deletion failed.");
    }
};

const canvas = document.getElementById('bgstar');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<150; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5,
            opacity: Math.random(),
            speed: 0.005 + Math.random() * 0.01
        });
    }
}

function drawStars() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    stars.forEach(s => {
        ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        s.opacity += s.speed;
        if(s.opacity > 1 || s.opacity < 0) s.speed = -s.speed;
    });
    requestAnimationFrame(drawStars);
}
initStars(); drawStars();

function setGreeting(data) {
    const name = data.firstName || "Strix Shop Team Member";
    const date = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
    document.getElementById("auto-greeting").innerHTML = 
        `Hello, Welcome to Strix Shop. Today is ${date}. My name is ${name}. How may I assist you today?
        <br><br>
        Hello, Today is ${date}. My name is ${name}.
        <br><br>
        Thank you for using Strix Shop. Have a wonderful day!`;
}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.exists() ? snap.data() : null;

    if (!data || data.acc !== "admin") {
        alert("ACCESS DENIED");
        window.location.href = "home.html";
        return;
    }

    document.body.classList.add("authorized");

    window.currentUser = {
        uid: user.uid,
        ...data
    };

    setGreeting(data);
    loadUsers();
});

let activeUserElement = null;

function loadUsers() {
    const list = document.getElementById("user-list");

    onSnapshot(collection(db, "users"), (snap) => {
        list.innerHTML = "";

        snap.forEach(d => {
            const u = d.data();

            if (u.acc === "admin") return;

            const div = document.createElement("div");
            div.className = "user-item";

            const name = `${u.firstName || ""} ${u.lastName || ""}`.trim() || "Unnamed Client";

            div.innerHTML = `
                <div class="user-pfp" style="background-image:url('${u.pfp || "https://via.placeholder.com/100"}')"></div>
                <div class="user-info">
                    <div class="name">${name}</div>
                    <div class="email">${u.email || "No secure email"}</div>
                </div>
            `;

            div.onclick = () => {

                if (activeUserElement) {
                    activeUserElement.classList.remove("active-chat");
                }

                div.classList.add("active-chat");
                activeUserElement = div;

                openChat(d.id, name);
            };

            list.appendChild(div);
        });
    });
}

function openChat(uid, name) {
    activeClient = uid;

    document.getElementById("chat-header").style.display = "block";
    document.getElementById("chat-name").innerText = name;

    toggleClearButton(true);

    document.getElementById("placeholder").style.display = "none";
    document.getElementById("messages-container").style.display = "flex";
    document.getElementById("chat-form").style.display = "flex";

    const q = query(
        collection(db, "support_chats", uid, "messages"),
        orderBy("timestamp", "asc")
    );

    onSnapshot(q, (snap) => {
        const container = document.getElementById("messages-container");
        container.innerHTML = "";

        snap.forEach(m => {
            const d = m.data();

            const time = d.timestamp
                ? new Date(d.timestamp.toDate()).toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                })
                : "...";

            const div = document.createElement("div");

            div.className = `msg-wrapper ${
                d.acc === "admin" ? "msg-admin" : "msg-user"
            }`;

            div.innerHTML = `
                <div class="bubble">${d.text}</div>
                <div class="msg-meta">${time}</div>
            `;

            container.appendChild(div);
        });

        container.scrollTop = container.scrollHeight;
    });
}

document.getElementById("chat-form").onsubmit = async (e) => {
    e.preventDefault();
    const input = document.getElementById("msg-input");
    const val = input.value.trim();
    if (!activeClient || !val) return;
    input.value = "";
    try {
        await addDoc(collection(db, "support_chats", activeClient, "messages"), {
            text: val, acc: "admin", timestamp: serverTimestamp()
        });
    } catch (err) { console.error(err); }
};
</script>
</body>
</html>
