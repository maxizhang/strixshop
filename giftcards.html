<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Strix Shop | Gift Cards</title>

    <link rel="icon" type="image/png" href="logospfd.png">

    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="bgstar"></canvas>

    <nav class="gift-nav">

        <a href="home.html">
            <img src="logoh.png" alt="STRIX">
        </a>

        <div class="nav-title">
            STRIX GIFT CARDS
        </div>

        <a href="cart.html" class="cart-pill">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 
                0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 
                2-2-.9-2-2-2zM7.17 14h9.95c.75 
                0 1.41-.41 1.75-1.03l3.58-6.49A1 
                1 0 0 0 21.58 5H5.21l-.94-2H1v2h2l3.6 
                7.59-1.35 2.44A2 2 0 0 0 5 16c0 
                1.1.9 2 2 2h12v-2H7l1.17-2z"/>
            </svg>

            <span id="cart-count">0</span>

        </a>

    </nav>
<section class="ethics-header-simple">

    <div class="container">

        <div class="header-section">
            <h1>Strix Shop Gift Cards</h1>

            <p class="header-description">
                Purchase gift cards for friends, classmates, or future purchases.
                Credits are securely linked and delivered as quickly as possible.
            </p>

        </div>

    </div>

   </section>

    <main class="gift-main">

        <div class="gc-grid" id="gc-container">
        </div>

    </main>

    <div id="toast">
        Added to Cart
    </div>

    <footer>
        &copy; 2026 STRIX SHOP
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>

        const firebaseConfig = {
            apiKey: "AIzaSyDKed-yuAcwqKqcL6fn2WnBhRPcq-PbDtU",
            authDomain: "strix-shop.firebaseapp.com",
            projectId: "strix-shop"
        };

        firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {

            if (user) {
                updateCartCounter();
                loadGiftCards();
            } else {
                window.location.href = "index.html";
            }

        });

        function updateCartCounter() {

            db.collection("carts")
            .doc(auth.currentUser.uid)
            .collection("items")
            .onSnapshot(snap => {

                document.getElementById("cart-count").innerText = snap.size;

            });

        }

        function loadGiftCards() {

            const container = document.getElementById("gc-container");

            db.collection("products")
            .where("category", "==", "GIFT CARDS")
            .onSnapshot(snap => {

                container.innerHTML = "";

                if (snap.empty) {

                    container.innerHTML = `
                        <div class="empty-state">
                            <h2>No Gift Cards Available</h2>
                            <p>Please check back later.</p>
                        </div>
                    `;

                    return;
                }

                snap.forEach(doc => {

                    const p = doc.data();

                    let imgDisplay = "";

                    if (p.images && p.images[0]) {

                        imgDisplay = p.images[0];

                    } else if (p.sku) {

                        const parts = p.sku.split('.');
                        imgDisplay = `giftcard${parts[1]}.${parts[2]}.png`;

                    } else {

                        imgDisplay = "logospfd.png";

                    }

                    const card = document.createElement("div");

                    card.className = "gift-card";

                    card.innerHTML = `

                        <div class="gift-image-wrap">

                            <img 
                                src="${imgDisplay}" 
                                onerror="this.src='logospfd.png'"
                            >

                            <div class="gift-overlay"></div>

                        </div>

                        <div class="gift-content">

                            <div class="gift-top">

                                <div class="gift-sku">
                                    ${p.sku || "STRIX-GC"}
                                </div>

                                <h2>
                                    ${p.name}
                                </h2>

                                <p>
                                    Gift cards will be accepted when payment is collected.
                                </p>

                            </div>

                            <div class="gift-bottom">

                                <div class="gift-price">
                                    $${Number(p.price).toFixed(2)}
                                </div>

                                <button 
                                    class="gift-btn"
                                    onclick="addToCart(
                                        '${doc.id}',
                                        '${p.name}',
                                        ${p.price},
                                        '${imgDisplay}',
                                        '${p.sku || "GC-UPLOAD"}'
                                    )"
                                >
                                    Add to Cart
                                </button>

                            </div>

                        </div>

                    `;

                    container.appendChild(card);

                });

            });

        }

        async function addToCart(id, name, price, img, sku) {

            const btn = event.target;

            btn.innerText = "LINKING...";
            btn.disabled = true;

            try {

                await db.collection("carts")
                .doc(auth.currentUser.uid)
                .collection("items")
                .add({

                    productId: id,
                    name: name,
                    price: price,
                    qty: 1,
                    image: img,

                    selections: {
                        "SKU_LOCK": sku
                    },

                    addedAt:
                        firebase.firestore.FieldValue.serverTimestamp()

                });

                const toast = document.getElementById("toast");

                toast.style.display = "block";

                setTimeout(() => {

                    toast.style.display = "none";

                }, 2500);

            } finally {

                btn.innerText = "Add to Cart";
                btn.disabled = false;

            }

        }

        // STARFIELD

        const canvas = document.getElementById("bgstar");
        const ctx = canvas.getContext("2d");

        let stars = [];

        function resize() {

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

        }

        class Star {

            constructor() {

                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;

                this.size = Math.random() * 1.6;

                this.alpha = Math.random();

                this.speed = Math.random() * 0.02;

            }

            draw() {

                this.alpha += this.speed;

                if (this.alpha >= 1 || this.alpha <= 0) {
                    this.speed = -this.speed;
                }

                ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;

                ctx.beginPath();

                ctx.arc(
                    this.x,
                    this.y,
                    this.size,
                    0,
                    Math.PI * 2
                );

                ctx.fill();

            }

        }

        function initStars() {

            stars = [];

            for (let i = 0; i < 140; i++) {

                stars.push(new Star());

            }

        }

        function animate() {

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            stars.forEach(star => star.draw());

            requestAnimationFrame(animate);

        }

        window.addEventListener("resize", () => {

            resize();
            initStars();

        });

        resize();
        initStars();
        animate();

    </script>

</body>
</html>
