async function renameCategory() {

    const snap = await db
        .collection("products")
        .where("category", "==", "TOYS")
        .get();

    const batch = db.batch();

    snap.forEach(doc => {

        batch.update(doc.ref, {
            category: "TOYS AND GAMES"
        });

    });

    await batch.commit();

    console.log("DONE");
}

renameCategory();
