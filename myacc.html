<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strix Shop | My Account</title>
    <link rel="icon" type="image/png" href="logospfd.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #404577;
            --bg-deep: #020205;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent: #6f8bb9;
            --admin-gold: rgb(255, 213, 28);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background: var(--bg-deep); color: var(--text-main);
            font-family: 'Quicksand', sans-serif;
        }

        .bg-png-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('indexbg.png');
            background-size: cover; background-position: center;
            opacity: 0.15; z-index: 0;
        }

        #bgstar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 12, 18, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo img { height: 30px; cursor: pointer; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-weight: 700; margin-left: 25px; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: white; }

        #admin-link {
            display: none; 
            color: var(--admin-gold) !important;
            border: 1px solid var(--admin-gold);
            padding: 5px 12px;
            border-radius: 8px;
            background: rgba(255, 193, 7, 0.05);
        }
        #admin-link:hover {
            background: var(--admin-gold);
            color: black !important;
        }

        .container { position: relative; z-index: 10; max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        .profile-header {
            display: flex; align-items: center; gap: 30px;
            background: var(--glass); padding: 40px; border-radius: 40px;
            border: 1px solid var(--glass-border); backdrop-filter: blur(20px);
            margin-bottom: 30px;
        }
        .pfp-wrap { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); overflow: hidden; background: #111; }
        .pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .data-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; 
            width: 100%;
        }

        .vault-card {
            background: var(--glass); 
            border-radius: 30px; 
            border: 1px solid var(--glass-border);
            padding: 40px;
            backdrop-filter: blur(10px);
            width: 100%; 
            box-sizing: border-box;
        }

        .card-title { font-weight: 800; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-size: 0.75rem; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .label { color: var(--text-dim); }
        .val { font-weight: 700; text-align: right; }

        .bottom-bar { text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="bg-png-layer"></div>
<canvas id="bgstar"></canvas>

<nav>
    <div class="nav-logo" onclick="window.location.href='home.html'"><img src="logoh.png" alt="STRIX"></div>
    <div class="nav-links">
        <a href="adminportal.html" id="admin-link">Admin Terminal</a>
        <a href="home.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="myacc.html" style="color:white">Account</a>
    </div>
</nav>

<div class="container">
    <div class="profile-header">
        <div class="pfp-wrap"><img id="display-pfp" src="logospfd.png"></div>
        <div style="flex: 1;">
            <h1 id="display-username" style="margin:0">Syncing...</h1>
            <p id="display-email" style="margin:5px 0 0; color:var(--text-dim)"></p>
        </div>
        <div style="text-align: center; padding: 0 20px; border-left: 1px solid var(--glass-border);">
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; font-weight: 700; color: white;" id="val-ssc">---</div>
            <div style="font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); font-weight: 700; text-transform: uppercase;">Strix Shop Credits</div>
        </div>
    </div>

    <div class="data-grid">
        <div class="vault-card">
            <span class="card-title">Identity</span>
            <div style="height:20px"></div>
            <div class="info-row"><span class="label">Full Name</span><span class="val" id="val-fullname">---</span></div>
            <div class="info-row"><span class="label">Date of Birth</span><span class="val" id="val-dob">---</span></div>
            <div class="info-row"><span class="label">Age</span><span class="val" id="val-age">---</span></div>
            <div class="info-row"><span class="label">Gender</span><span class="val" id="val-gender">---</span></div>
            <div class="info-row"><span class="label">Pronouns</span><span class="val" id="val-pronouns">---</span></div>
        </div>

        <div class="vault-card">
            <span class="card-title">Academic</span>
            <div style="height:20px"></div>
            <div class="info-row"><span class="label">School</span><span class="val" id="val-school">---</span></div>
            <div class="info-row"><span class="label">Grade Level</span><span class="val" id="val-grade">---</span></div>
        </div>

        <div class="vault-card">
            <span class="card-title">Security</span>
            <div style="height:20px"></div>
            <div class="info-row"><span class="label">Security Question</span><span class="val" id="val-question">---</span></div>
            <div class="info-row"><span class="label">Recovery Email</span><span class="val" id="val-recovery">---</span></div>
            <div class="info-row"><span class="label">Member Since</span><span class="val" id="val-timestamp">---</span></div>
        </div>
    </div>

    <div class="bottom-bar">
        &copy; 2026 STRIX SHOP, ALL RIGHTS RESERVED.
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDKed-yuAcwqKqcL6fn2WnBhRPcq-PbDtU", 
        authDomain: "strix-shop.firebaseapp.com", 
        projectId: "strix-shop" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const docRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const data = docSnap.data();

                const adminLink = document.getElementById('admin-link');
                const masterUID = "PNssYZn1wNUGjmzeAq1eHz2QHKf1";
                
                if (data.acc === "admin" || user.uid === masterUID) {
                    if (adminLink) adminLink.style.display = "inline-block";
                }
                
                const sscElement = document.getElementById('val-ssc');
                if(sscElement) sscElement.innerText = (data.ssc !== undefined) ? data.ssc : "100";
                
                document.getElementById('display-username').innerText = data.username || "Authorized Personnel";
                document.getElementById('display-email').innerText = user.email || "";
                
                const pfpElement = document.getElementById('display-pfp');
                pfpElement.src = data.pfp || "logospfd.png";
                
                document.getElementById('val-fullname').innerText = `${data.firstName || ''} ${data.lastName || ''}`.trim() || '---';
                document.getElementById('val-dob').innerText = data.dob || '---';
                document.getElementById('val-age').innerText = data.age || '---';
                document.getElementById('val-gender').innerText = data.gender || '---';
                document.getElementById('val-pronouns').innerText = data.pronouns || '---';
                document.getElementById('val-school').innerText = data.school || '---';
                document.getElementById('val-grade').innerText = data.grade ? "Grade " + data.grade : '---';
                document.getElementById('val-question').innerText = data.securityQuestion || '---';
                document.getElementById('val-recovery').innerText = data.recoveryEmail || "None";
                document.getElementById('val-timestamp').innerText = data.createdAt? data.createdAt.toDate().toLocaleString(): 'UNDEFINED';}
        } else { 
            window.location.href = "index.html"; 
        }
    });

    const canvas = document.getElementById('bgstar');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    class Star {
        constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.alpha = Math.random(); this.blink = Math.random() * 0.02; }
        draw() {
            this.alpha += this.blink; if (this.alpha > 1 || this.alpha < 0) this.blink = -this.blink;
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
    }
    function initStars() { stars = []; for(let i=0; i<150; i++) stars.push(new Star()); }
    function animate() { ctx.clearRect(0,0,canvas.width, canvas.height); stars.forEach(s => s.draw()); requestAnimationFrame(animate); }
    window.addEventListener('resize', () => { resize(); initStars(); });
    resize(); initStars(); animate();
</script>
</body>
</html>
