<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strix | Personnel Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020205;
            --panel: rgba(13, 17, 24, 0.98);
            --glass: rgba(255, 255, 255, 0.08);
            --accent: #c1bee9;
            --text: #ffffff;
            --dim: rgba(255, 255, 255, 0.5);
            --error: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        #bgsnow { position: fixed; inset: 0; z-index: 0; pointer-events: none; }


        header {
            position: relative; z-index: 10;
            padding: 12px 3%;
            background: rgba(10, 12, 18, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-main { height: 28px; cursor: pointer; }

        .container {
            position: relative; z-index: 10;
            height: calc(100vh - 55px);
            padding: 20px 3%;
            overflow: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 10px; color: var(--accent); padding: 10px; text-transform: uppercase; letter-spacing: 2px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); font-size: 13px; }
        tr:hover td { background: rgba(193, 190, 233, 0.05); cursor: pointer; }

        .pfp-mini { width: 32px; height: 32px; border-radius: 50%; background-size: cover; border: 1px solid var(--glass); }

        .sidebar {
            position: fixed; top: 0; right: -550px;
            width: 550px; height: 100vh;
            background: var(--panel);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass);
            z-index: 999;
            display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sidebar.open { transform: translateX(-550px); }

        .dossier-top {
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            border-bottom: 1px solid var(--glass);
        }
        .pfp-large {
            width: 100px; height: 100px;
            border-radius: 50%;
            background-size: cover; background-position: center;
            border: 2px solid var(--accent);
            flex-shrink: 0;
        }
        .top-info { flex: 1; }
        .top-info h2 { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .uid-tag { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--dim); }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 20px 30px; }
        .close-trigger { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: var(--dim); }


        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .field { 
            background: rgba(255, 255, 255, 0.02); 
            padding: 10px 12px; 
            border-radius: 10px; 
            border: 1px solid var(--glass);
        }
        .full-width { grid-column: span 2; }
        .label { font-size: 9px; color: var(--accent); font-weight: 700; margin-bottom: 3px; letter-spacing: 1px; }
        .value { outline: none; font-size: 13px; color: #fff; display: block; word-break: break-all; }

        .sidebar-footer { 
            padding: 15px 30px; 
            border-top: 1px solid var(--glass);
            display: flex; gap: 10px;
        }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s;
            text-transform: uppercase;
        }
        .save-btn { background: var(--accent); color: #000; }
        .delete-btn { background: transparent; border: 1px solid var(--error); color: var(--error); }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--glass); }
    </style>
</head>
<body>

<canvas id="bgsnow"></canvas>

<header>
    <img src="logoh.png" class="logo-main" onclick="location.href='home.html'">
    <div id="count" style="font-family:'JetBrains Mono'; font-size:11px; color:var(--accent);">RECORDS: 0</div>
</header>

<div class="container">
    <table>
        <thead>
            <tr>
                <th></th>
                <th>Operative</th>
                <th>Secure Email</th>
                <th>Class</th>
                <th>SSC</th>
            </tr>
        </thead>
        <tbody id="body"></tbody>
    </table>
</div>

<div class="sidebar" id="sidebar">
    <div class="close-trigger" onclick="closeSidebar()">×</div>
    
    <div class="dossier-top">
        <div class="pfp-large" id="side-pfp"></div>
        <div class="top-info">
            <h2 id="side-name">Name</h2>
            <div class="uid-tag" id="side-uid">UID: ---</div>
            <div id="side-acc-tag" style="margin-top:8px; font-size:10px; font-weight:800; color:var(--accent); letter-spacing:1px;">CUSTOMER</div>
        </div>
    </div>

    <div class="sidebar-content">
        <div class="field-grid" id="fields-container"></div>
    </div>

    <div class="sidebar-footer">
        <button class="btn delete-btn" onclick="deleteAccount()">Delete User</button>
        <button class="btn save-btn" onclick="save()">Update</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyDKed-yuAcwqKqcL6fn2WnBhRPcq-PbDtU",
    authDomain: "strix-shop.firebaseapp.com",
    projectId: "strix-shop"
});

const db = firebase.firestore();
let currentId = null;
let currentUserData = null;

firebase.auth().onAuthStateChanged(async u => {

    if (!u) {
        location.href = "index.html";
        return;
    }

    const me = await db.collection("users").doc(u.uid).get();

    if (!me.exists) {
        location.href = "home.html";
        return;
    }

    currentUserData = me.data();

    const canView = currentUserData.acc === "admin";
    const canModify = currentUserData.acc === "admin";

    if (!canView) {
        location.href = "home.html";
        return;
    }

    load();

    if (!canModify) {

        const saveBtn = document.querySelector(".save-btn");
        const deleteBtn = document.querySelector(".delete-btn");

        saveBtn.style.opacity = "0.5";
        deleteBtn.style.opacity = "0.5";

        saveBtn.style.cursor = "not-allowed";
        deleteBtn.style.cursor = "not-allowed";
    }

});

function load(){
    db.collection("users").onSnapshot(snap => {
        document.getElementById("count").innerText = "TOTAL USERS: " + snap.size;
        const body = document.getElementById("body");
        body.innerHTML = "";

        snap.forEach(doc => {
            const u = doc.data();
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><div class="pfp-mini" style="background-image:url('${u.pfp || 'https://via.placeholder.com/100'}')"></div></td>
                <td style="font-weight:700;">${u.firstName || ""} ${u.lastName || ""}</td>
                <td style="color:var(--dim); font-size:11px;">${u.email || "---"}</td>
                <td style="color:var(--accent); font-weight:700; text-transform:uppercase; font-size:10px;">${u.acc || "customer"}</td>
                <td>${u.ssc || 0}</td>
            `;
            tr.onclick = () => openSidebar(doc.id, u);
            body.appendChild(tr);
        });
    });
}

function openSidebar(id, u){
    currentId = id;
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("side-pfp").style.backgroundImage = `url('${u.pfp || 'https://via.placeholder.com/200'}')`;
    document.getElementById("side-name").innerText = (u.firstName || "") + " " + (u.lastName || "");
    document.getElementById("side-uid").innerText = "ID: " + id.toUpperCase();
    document.getElementById("side-acc-tag").innerText = (u.acc || "customer").toUpperCase();

    const container = document.getElementById("fields-container");
    container.innerHTML = "";

    const dataMap = {
        "First Name": u.firstName,
        "Last Name": u.lastName,
        "Email": u.email,
        "Username": u.username,
        "Classification": u.acc,
        "Grade": u.grade,
        "School": u.school,
        "Age": u.age,
        "DOB": u.dob,
        "Gender": u.gender,
        "Pronouns": u.pronouns,
        "SSC Balance": u.ssc,
        "Recovery Email": u.recoveryEmail,
        "Created At": u.createdAt,
        "Profile URL": u.pfp,
        "Sec Question": u.securityQuestion,
        "Sec Answer": u.securityAnswer
    };

Object.keys(dataMap).forEach((k) => {
        const div = document.createElement("div");
        
        const isLong = k === "Email" || k === "Profile URL" || k === "Created At" || k === "Sec Question";
        div.className = isLong ? "field full-width" : "field";

        const isLocked = k === "SSC Balance" || k === "Created At";
        const editableAttr = isLocked ? "" : 'contenteditable="true"';

        div.innerHTML = `
            <div class="label">${k.toUpperCase()}</div>
            <div class="value" ${editableAttr}>${dataMap[k] !== undefined ? dataMap[k] : "---"}</div>
        `;
        container.appendChild(div);
    });
}

function closeSidebar(){ document.getElementById("sidebar").classList.remove("open"); }

async function save(){

    if (!currentUserData || currentUserData.acc !== "admin") {
        alert("ACCESS DENIED");
        return;
    }

    const fields = document.querySelectorAll(".field");

    const update = {};

    const keyMap = {
        "FIRST NAME":"firstName",
        "LAST NAME":"lastName",
        "CLASSIFICATION":"acc",
        "EMAIL":"email",
        "USERNAME":"username",
        "GRADE":"grade",
        "SCHOOL":"school",
        "AGE":"age",
        "GENDER":"gender",
        "PRONOUNS":"pronouns",
        "DOB":"dob",
        "SSC BALANCE":"ssc",
        "RECOVERY EMAIL":"recoveryEmail",
        "PROFILE URL":"pfp",
        "SEC QUESTION":"securityQuestion",
        "SEC ANSWER":"securityAnswer"
    };

    fields.forEach(f => {

        const label = f.querySelector(".label").innerText;
        const val = f.querySelector(".value").innerText;

        if (keyMap[label]) {

            let finalVal = val === "---" ? "" : val;

            if (label === "SSC BALANCE") {
                finalVal = Number(finalVal) || 0;
            }

            update[keyMap[label]] = finalVal;
        }
    });

    try {

        await db.collection("users").doc(currentId).update(update);

        alert("RECORD UPDATED");

    } catch (err) {

        console.error(err);
        alert("UPDATE FAILED");
    }
}

async function deleteAccount(){

    if (!currentUserData || currentUserData.currentUserData.acc !== "admin") {
        alert("ACCESS DENIED");
        return;
    }

    const confirmDelete = confirm(
        "Permanently delete this record from files?"
    );

    if (!confirmDelete) return;

    try {

        await db.collection("users").doc(currentId).delete();

        alert("RECORD DELETED");

        closeSidebar();

    } catch (err) {

        console.error(err);
        alert("DELETION FAILED");
    }
}


const canvas = document.getElementById('bgsnow');
const ctx = canvas.getContext('2d');
let snow = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
class Flake {
    constructor() { this.reset(); }
    reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * -canvas.height; this.size = Math.random() * 2 + 1; this.speed = Math.random() * 1 + 0.5; this.o = Math.random() * 0.5 + 0.2; }
    update() { this.y += this.speed; if(this.y > canvas.height) this.reset(); }
    draw() { ctx.fillStyle = `rgba(255,255,255,${this.o})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
}
window.onresize = resize; resize();
for(let i=0; i<100; i++) snow.push(new Flake());
function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); snow.forEach(f => { f.update(); f.draw(); }); requestAnimationFrame(animate); }
animate();
</script>
</body>
</html>
